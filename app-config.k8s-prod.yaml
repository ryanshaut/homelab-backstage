# Kubernetes production overlay

app:
  baseUrl: ${APP_BASE_URL}

backend:
  baseUrl: ${BACKEND_BASE_URL}
  cors:
    origin:
      - ${APP_BASE_URL}
      - ${BACKEND_BASE_URL}

auth:
  environment: production
  experimentalExtraAllowedOrigins:
    - ${APP_BASE_URL}
    - ${BACKEND_BASE_URL}

catalog:
  locations:
    # Example remote template sources.
    # Point these URLs at raw catalog YAML in your template repositories.
    - type: url
      target: ${TEMPLATE_REPO_1_URL}
      rules:
        - allow: [Template]
    - type: url
      target: ${TEMPLATE_REPO_2_URL}
      rules:
        - allow: [Template]
