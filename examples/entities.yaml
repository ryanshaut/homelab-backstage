---
# ── Systems ──────────────────────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: data-platform
  description: Homelab data-platform system
  tags:
    - data
spec:
  owner: group:platform-team
---
# ── APIs ─────────────────────────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: homelab-events-api
  description: Homelab events stream
spec:
  type: async-api
  lifecycle: experimental
  owner: group:platform-team
  system: data-platform
  definition: |
    asyncapi: 2.6.0
    info:
      title: Homelab Events API
      version: 0.1.0
    channels:
      homelab-events:
        description: General homelab event stream
        subscribe:
          message:
            contentType: application/json
---
# ── Components ────────────────────────────────────────────────────────────────

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: homelab-event-producer
  description: Publishes events to the homelab-events stream
  tags:
    - data
spec:
  type: service
  lifecycle: experimental
  owner: group:platform-team
  system: data-platform
  providesApis:
    - homelab-events-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: homelab-data-pipeline
  description: Data pipeline that processes homelab metrics
  tags:
    - data
spec:
  type: service
  lifecycle: experimental
  owner: group:platform-team
  system: data-platform
